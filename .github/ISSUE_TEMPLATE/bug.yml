name: 🐛 Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "triage"]

body:
  - type: markdown
    attributes:
      value: |
        感谢报告 bug！请尽量填写以下信息以帮助我们快速定位问题。

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰简洁地描述 bug 是什么
      placeholder: 当我做 X 时，期望 Y 发生，但实际发生了 Z
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 按顺序列出复现步骤
      placeholder: |
        1. 进入页面 '...'
        2. 点击 '...'
        3. 看到错误 '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么

  - type: textarea
    id: screenshots
    attributes:
      label: 截图 / 日志
      description: 如有，贴上截图或错误日志

  - type: input
    id: environment
    attributes:
      label: 环境
      description: 浏览器、OS、Node 版本等
      placeholder: "Chrome 120, macOS 14, Node 20.11"

  - type: textarea
    id: context
    attributes:
      label: 其他上下文
      description: 任何可能有帮助的信息
