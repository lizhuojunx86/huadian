name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  PNPM_VERSION: "9.15.4"

jobs:
  # ── Steps 1-6: lint → typecheck → codegen:verify → test → build ──
  ci:
    name: lint → typecheck → codegen → test → build
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    services:
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Step 0: Start PostgreSQL (custom image) ──────────────
      - name: "Step 0: start postgres (custom image)"
        run: |
          docker build -t huadian-postgres docker/postgres/
          docker run -d --name postgres \
            -e POSTGRES_USER=huadian \
            -e POSTGRES_PASSWORD=huadian_ci \
            -e POSTGRES_DB=huadian_test \
            -v ${{ github.workspace }}/db/init:/docker-entrypoint-initdb.d:ro \
            -p 5432:5432 \
            huadian-postgres
          # Wait for PG ready
          for i in $(seq 1 60); do
            if docker exec postgres pg_isready -U huadian -d huadian_test &>/dev/null; then
              break
            fi
            sleep 1
          done
          # Wait for initdb scripts (extensions) to finish
          sleep 5
          # Verify extensions actually loaded (fail early if not)
          docker exec postgres psql -U huadian -d huadian_test -t -c '\dx' | grep -q vector
          docker exec postgres psql -U huadian -d huadian_test -t -c '\dx' | grep -q pg_trgm
          echo "✅ PostgreSQL ready with all extensions"

      # ── Install toolchains ───────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      # ── Step 1: Install dependencies ─────────────────────────
      - name: "Step 1: pnpm install"
        run: pnpm install --frozen-lockfile

      - name: Configure git for private deps
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: "Step 1: uv sync"
        run: uv sync --all-packages

      # ── Step 2: Lint ─────────────────────────────────────────
      - name: "Step 2: ESLint"
        run: pnpm lint

      - name: "Step 2: ruff"
        run: uv run ruff check .

      # ── Step 3: Typecheck ────────────────────────────────────
      - name: "Step 3: tsc"
        run: pnpm typecheck

      - name: "Step 3: basedpyright"
        run: uv run --project services/pipeline basedpyright -p services/pipeline

      # ── Step 4: Codegen verify ───────────────────────────────
      - name: "Step 4: codegen:verify"
        run: |
          pnpm codegen
          git diff --exit-code packages/shared-types/schema/ services/pipeline/src/huadian_pipeline/generated/ || {
            echo "::error::Codegen output is stale. Run 'pnpm codegen' locally and commit the result."
            exit 1
          }

      # ── Step 4b: Apply DB schema ─────────────────────────────
      - name: "Step 4b: apply DB schema (drizzle migrate)"
        run: pnpm --filter @huadian/api db:migrate
        env:
          DATABASE_URL: postgresql://huadian:huadian_ci@localhost:5432/huadian_test

      # ── Step 4c: Apply pipeline SQL migrations ───────────────
      # Pipeline-only tables/indexes (e.g. person_merge_log) live in
      # services/pipeline/migrations/*.sql and are NOT managed by Drizzle.
      # All pipeline migrations are idempotent (IF NOT EXISTS / targeted
      # WHERE). Run them in filename order after Drizzle schema is applied.
      # Tracked as debt T-P1-005 (unify migration entry point).
      - name: "Step 4c: apply pipeline SQL migrations"
        run: |
          for f in services/pipeline/migrations/*.sql; do
            echo "[pipeline-migrate] applying $(basename "$f")"
            PGPASSWORD=huadian_ci psql -h localhost -U huadian -d huadian_test \
              -v ON_ERROR_STOP=1 -f "$f"
          done

      # ── Step 5: Test ─────────────────────────────────────────
      - name: "Step 5: test (vitest)"
        run: pnpm test
        env:
          DATABASE_URL: postgresql://huadian:huadian_ci@localhost:5432/huadian_test
          REDIS_URL: redis://localhost:6379

      - name: "Step 5: test (pytest)"
        run: uv run --project services/pipeline pytest services/pipeline -x --no-header || test $? -eq 5
        env:
          DATABASE_URL: postgresql://huadian:huadian_ci@localhost:5432/huadian_test

      # ── Step 6: Build ────────────────────────────────────────
      - name: "Step 6: build"
        run: pnpm build

      # ── Debug: dump postgres logs on failure ─────────────────
      - name: "Debug: postgres logs"
        if: failure()
        run: docker logs postgres 2>&1 | tail -80

  # ── Step 7: Docker smoke (parallel) ──────────────────────────
  docker-smoke:
    name: "docker smoke"
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build custom PG image
        run: docker build -t huadian-postgres-test docker/postgres/

      - name: Verify extensions
        run: |
          docker run -d --name pg-smoke \
            -e POSTGRES_USER=huadian \
            -e POSTGRES_PASSWORD=smoke \
            -e POSTGRES_DB=smoke \
            -v ${{ github.workspace }}/db/init:/docker-entrypoint-initdb.d:ro \
            huadian-postgres-test

          # Wait for PG to be fully ready (including init scripts)
          for i in $(seq 1 60); do
            if docker exec pg-smoke psql -U huadian -d smoke -c "SELECT 1" &>/dev/null; then
              break
            fi
            sleep 1
          done

          # Extra wait for init scripts to complete
          sleep 5

          # Verify all four extensions
          docker exec pg-smoke psql -U huadian -d smoke -t -c '\dx' | grep -q vector
          docker exec pg-smoke psql -U huadian -d smoke -t -c '\dx' | grep -q postgis
          docker exec pg-smoke psql -U huadian -d smoke -t -c '\dx' | grep -q pg_trgm
          echo "✅ All extensions verified: vector, postgis, postgis_topology, pg_trgm"

          docker rm -f pg-smoke

  # ── Step 7b: Secret scan (parallel) ──────────────────────────
  secret-scan:
    name: "gitleaks secret-scan"
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Step 8: GraphQL breaking change detection ───────────────
  # Migrated to dedicated workflow: .github/workflows/graphql-breaking.yml
  # (T-P0-003 subtask 6). Triggers on services/api/src/schema/** changes.
  # Phase 0: warn-only (continue-on-error); ADR-008 promotes to required.
