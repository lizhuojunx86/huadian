name: Pre-commit (gitleaks + lint-staged)

on:
  pull_request:
    branches: [main]

concurrency:
  group: pre-commit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: gitleaks + lint-staged
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9.15.4"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git for private deps
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install Python dependencies
        run: uv sync --all-packages

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit on all files
        run: |
          export PATH="$PWD/.venv/bin:$PATH"
          pre-commit run --all-files
