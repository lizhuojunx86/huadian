# Spring-Autumn / Warring-States 诸侯国名单 + 别名 / 异称。
#
# Used by: services/pipeline/src/huadian_pipeline/state_prefix_guard.py
# Task: T-P1-028 follow-up (Sprint I / ADR-025 §5.3)
#
# Convention:
#   - name: 主名（人名前缀使用的字符）
#   - aliases: 同国异称 / 古称（前缀 regex 字符集中视为等价，alias→canonical 归一）
#   - era: 春秋 / 战国 / 春秋战国（覆盖期，仅文档用，不参与 guard 判定）
#   - notes: 学术注解 / 来源
#
# Maintenance:
#   - 新国添加需要 historian ACK
#   - alias 必须不与其他 state 主名冲突（添加前 grep 检查）
#   - 双字国名（中山/鲜虞）暂不支持，待 backlog（争议项 C）
#
# 17 国（Sprint I Stage 0 inventory §2.2 / ADR-025 §5.3.4）：
#   不含"周"（裁决 A）/ 不含邾/莒/巴（裁决 B）
#   周 → dynasty_guard gap≥286 已 100% 兜底; 邾/莒/巴 → DB 0 surface

states:
