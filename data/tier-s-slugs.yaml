# ============================================================
# Tier-S Pinyin Slug Whitelist — 华典智谱
# ============================================================
#
# This file is the SINGLE SOURCE OF TRUTH for pinyin slug mappings.
# Names listed here get pinyin slugs; all others get unicode fallback.
#
# GOVERNANCE RULES (ADR-011):
#   1. Adding a new entry MUST be recorded in docs/CHANGELOG.md
#      or an ADR, with justification for why this person is Tier-S.
#   2. Do NOT commit changes to this file without documentation.
#   3. Entries should only be added for well-known historical figures
#      whose pinyin is unambiguous and collision-free.
#   4. Before adding: verify no slug collision with existing entries.
#
# FORMAT:
#   Chinese name (zh-Hans) → pinyin slug (lowercase, hyphen-separated)
#
# INVARIANT (enforced by CI):
#   Every persons.slug in the DB is either:
#     (a) a value in this whitelist, OR
#     (b) matches ^u[0-9a-f]{4}(-u[0-9a-f]{4})*$
#   Anything else is a bug.
# ============================================================

