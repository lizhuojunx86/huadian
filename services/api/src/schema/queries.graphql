# Query entrypoints for Phase 0.
# Every resolver below throws HuadianGraphQLError with code NOT_IMPLEMENTED
# (architect Q-10 ruling). The signatures ARE stable — they are the
# forward-compatible contract that T-P0-007, T-P0-008, and beyond plug
# into without breaking clients.
#
# `type Query { _schemaVersion }` is defined in _bootstrap.graphql as a
# permanent health probe; this file extends it with entity lookups.
#
# Pagination follows architect Q-5 ruling A: offset / limit for Phase 0.
# Migration to Relay cursor connections is deferred to ADR-008.

extend type Query {
  """
  Fetch one Person by stable slug (C-13). Returns null when the slug
  does not match any non-deleted row; an explicit NOT_FOUND error is
  NOT raised, so that callers can distinguish "absent" from "server
  error" without inspecting extensions.
  """
  person(slug: String!): Person

  """
  List Persons with offset-based pagination.

  Arguments:
    limit  maximum rows to return; clamped to [1, 100] server-side.
    offset number of rows to skip; MUST be non-negative.
  """
  persons(limit: Int = 20, offset: Int = 0): [Person!]!

  """Fetch one Event by stable slug. Returns null when absent."""
  event(slug: String!): Event

  """Fetch one Place by stable slug. Returns null when absent."""
  place(slug: String!): Place

  """
  Fetch one SourceEvidence by UUID. SourceEvidence is keyed by UUID
  (not slug) because individual quoted passages do not carry stable
  human-readable identifiers.
  """
  sourceEvidence(id: UUID!): SourceEvidence
}
