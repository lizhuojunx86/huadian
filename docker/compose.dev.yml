# ============================================================
# HuaDian — Local Development Docker Compose
# ============================================================
#
# Usage:
#   docker compose -f docker/compose.dev.yml up -d                           # PG + Redis (Phase 0 default)
#   docker compose -f docker/compose.dev.yml --profile observability up -d   # + OTel Collector (stdout)
#   docker compose -f docker/compose.dev.yml down
#
# Makefile shortcuts:
#   make up              # PG + Redis (Phase 0 default)
#   make up-with-otel    # + OTel Collector (trace → stdout)
#   make down
#
# All images pinned to specific versions (ADR-007 §R-5).
# No :latest or floating tags allowed.
# ============================================================

name: huadian-dev

services:
  # ── Core infrastructure (always on) ─────────────────────────

  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    container_name: huadian-postgres
    restart: unless-stopped
    ports:
      - "${HUADIAN_PG_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: huadian
      POSTGRES_PASSWORD: huadian_dev
      POSTGRES_DB: huadian
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U huadian -d huadian"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: huadian-redis
    restart: unless-stopped
    ports:
      - "${HUADIAN_REDIS_PORT:-6380}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── OTel Collector (activate via --profile observability) ───
  #
  # Phase 0: exports to stdout (logging exporter).
  # T-P0-005a will restore the signoz exporter once SigNoz is pinned.

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.0
    container_name: huadian-otel-collector
    profiles: ["observability"]
    restart: unless-stopped
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./otel/collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro

  # ---------- SigNoz stack (deferred to T-P0-005a) ----------
  # Reason: signoz/query-service:0.88.25 does not exist on Docker Hub.
  # SigNoz 0.40+ restructured image naming and compose layout.
  # Correct approach: pin to verified version with real trace traffic
  # during T-P0-005 (LLM Gateway + TraceGuard), not blind version guessing.
  #
